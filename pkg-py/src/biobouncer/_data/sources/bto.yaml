key: bto
name: BRENDA Tissue Ontology
description: BRENDA Tissue Ontology terms for tissues and cell lines.
# CURIE core pattern in ASCII classes so R (PCRE) and Python (re) agree.
pattern: "BTO:[0-9]{7}"
example: 'BTO:0000759'
species_aware: false
version_aware: true
curie:
  prefix: BTO
  pad_to: 7
cache:
  builder: obo
  obo_url: http://purl.obolibrary.org/obo/bto.obo
remote:
  resolver: ols
  ols_ontology: bto
provenance:
  pattern_source: bioregistry
  homepage: https://www.brenda-enzymes.org
