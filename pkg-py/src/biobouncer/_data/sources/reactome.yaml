key: reactome
name: Reactome
description: Reactome stable identifiers for pathways, reactions, and entities.
# R, a three-letter species code (HSA for human, MMU for mouse, and so on), and
# a number, with an optional version. Ids are uppercase; a lowercase input is
# suggested in its canonical case.
pattern: 'R-[A-Z]{3}-[0-9]+(?:\.[0-9]+)?'
example: 'R-HSA-68886'
normalize:
  case: upper
# remote mode checks existence against the Reactome content service. This is an
# existence check only; a superseded stable id is not yet reported with its
# successor.
remote:
  resolver: reactome
provenance:
  pattern_source: bioregistry
  homepage: https://reactome.org
