key: chembl
name: ChEMBL
description: ChEMBL identifiers for compounds, targets, assays, and documents.
# The CHEMBL prefix and digits. Accessions are uppercase; a lowercase input is
# suggested in its canonical case.
pattern: 'CHEMBL[0-9]+'
example: 'CHEMBL25'
normalize:
  case: upper
# remote mode checks existence against the ChEMBL id-lookup endpoint, which
# resolves an id of any entity type. This is an existence check only; the lookup
# status field is not interpreted yet, so an obsolete id is not reported with a
# successor.
remote:
  resolver: chembl
provenance:
  pattern_source: bioregistry
  homepage: https://www.ebi.ac.uk/chembl
