site_name: biogate (Python)
site_description: Validate biological identifiers and inputs the same way in R and Python.
site_url: https://www.samuelbharti.com/biogate/py/
repo_url: https://github.com/samuelbharti/biogate
repo_name: samuelbharti/biogate
edit_uri: edit/main/pkg-py/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Get started: index.md
  - Guide: guide.md
  - Clean a column: report.md
  - Examples: examples.md
  - Command line: cli.md
  - Sources cookbook: sources.md
  - API reference: reference.md
  - R docs: https://www.samuelbharti.com/biogate/r/

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            heading_level: 2
