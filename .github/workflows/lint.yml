name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run prek hooks
        run: uvx prek run --all-files --show-diff-on-failure --color=always
        env:
          # This hook only makes sense on a developer machine, not in CI.
          SKIP: no-commit-to-branch
