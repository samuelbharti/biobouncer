name: drift

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  drift:
    name: drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync shared spec into packages
        run: python tools/sync_shared.py
      - name: Fail if vendored copies drift from shared/
        run: git diff --exit-code
