name: python

on:
  push:
    branches: [main]
    paths: ["pkg-py/**", "shared/**", ".github/workflows/python.yml"]
  pull_request:
    paths: ["pkg-py/**", "shared/**", ".github/workflows/python.yml"]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: pkg-py

jobs:
  python:
    runs-on: ${{ matrix.os }}
    name: python (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest
