name: python

on:
  push:
    branches: [main]
    paths: ["python/**", "shared/**", ".github/workflows/python.yml"]
  pull_request:
    paths: ["python/**", "shared/**", ".github/workflows/python.yml"]

permissions:
  contents: read

defaults:
  run:
    working-directory: python

jobs:
  python:
    # Runs once the Python package exists. Until then the job is skipped.
    if: hashFiles('python/pyproject.toml') != ''
    runs-on: ${{ matrix.os }}
    name: python (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest
