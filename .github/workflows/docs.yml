name: docs

on:
  push:
    branches: [main]
    paths:
      - "pkg-r/**"
      - "pkg-py/**"
      - "shared/**"
      - "docs-hub/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "pkg-r/**"
      - "pkg-py/**"
      - "shared/**"
      - "docs-hub/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-r:
    runs-on: ubuntu-latest
    name: build-r
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
          working-directory: pkg-r

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
        working-directory: pkg-r

      - uses: actions/upload-artifact@v4
        with:
          name: site-r
          path: pkg-r/docs
          if-no-files-found: error

  build-py:
    runs-on: ubuntu-latest
    name: build-py
    defaults:
      run:
        working-directory: pkg-py
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build mkdocs site
        run: uv run --group docs mkdocs build --strict --site-dir site

      - uses: actions/upload-artifact@v4
        with:
          name: site-py
          path: pkg-py/site
          if-no-files-found: error

  deploy:
    needs: [build-r, build-py]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: deploy
    permissions:
      # A job-level permissions block replaces the defaults, so contents must be
      # named explicitly or actions/checkout cannot read this private repo.
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Assemble combined site
        run: |
          mkdir -p _site
          cp docs-hub/index.html _site/index.html
          cp -r docs-hub/assets _site/assets
          touch _site/.nojekyll

      - uses: actions/download-artifact@v4
        with:
          name: site-r
          path: _site/r

      - uses: actions/download-artifact@v4
        with:
          name: site-py
          path: _site/py

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
