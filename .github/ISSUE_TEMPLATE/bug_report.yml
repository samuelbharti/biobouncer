name: Bug report
description: Report a problem with biobouncer
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: input
    id: version
    attributes:
      label: Version and language
      description: Which biobouncer version, and R or Python
      placeholder: "biobouncer 0.0.0.9000, R"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect to happen, and what happened instead
    validations:
      required: true
  - type: textarea
    id: reprex
    attributes:
      label: Reproducible example
      description: The smallest code that reproduces the problem
      render: text
    validations:
      required: false
