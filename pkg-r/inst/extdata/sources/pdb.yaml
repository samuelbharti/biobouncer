key: pdb
name: PDB
description: Protein Data Bank four-character structure identifiers.
# A leading digit 1 to 9 and three alphanumerics. Ids are uppercase; a lowercase
# input is suggested in its canonical case. The newer extended pdb_ accession is
# not covered yet.
pattern: '[1-9][A-Z0-9]{3}'
example: '4HHB'
normalize:
  case: upper
# remote mode checks existence against the RCSB PDB data API. This is an
# existence check only; an obsoleted structure that was superseded is not yet
# reported with its successor.
remote:
  resolver: pdb
provenance:
  pattern_source: bioregistry
  homepage: https://www.rcsb.org
