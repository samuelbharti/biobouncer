key: chembl
name: ChEMBL
description: ChEMBL identifiers for compounds, targets, assays, and documents.
# The CHEMBL prefix and digits. Accessions are uppercase; a lowercase input is
# suggested in its canonical case.
pattern: 'CHEMBL[0-9]+'
normalize:
  case: upper
provenance:
  pattern_source: bioregistry
  homepage: https://www.ebi.ac.uk/chembl
