key: mirbase
name: miRBase
description: miRBase accession numbers for mature microRNAs.
# MIMAT and exactly seven digits. Ids are uppercase; a lowercase input
# is suggested in its canonical case.
pattern: 'MIMAT[0-9]{7}'
example: 'MIMAT0000001'
normalize:
  case: upper
# remote mode checks existence against RNAcentral through EBI Search, which
# indexes miRBase mature accessions. miRBase has no existence API of its own.
# This is an existence check only; a withdrawn accession is reported as absent.
remote:
  resolver: mirbase
provenance:
  pattern_source: bioregistry
  homepage: https://www.mirbase.org
