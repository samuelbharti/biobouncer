key: uberon
name: Uberon
description: Uberon cross-species anatomy ontology terms.
# CURIE core pattern in ASCII classes so R (PCRE) and Python (re) agree.
pattern: "UBERON:[0-9]{7}"
species_aware: false
version_aware: true
curie:
  prefix: UBERON
  pad_to: 7
cache:
  builder: obo
  obo_url: http://purl.obolibrary.org/obo/uberon.obo
remote:
  resolver: ols
  ols_ontology: uberon
provenance:
  pattern_source: bioregistry
  homepage: https://obophenotype.github.io/uberon
